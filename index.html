<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBBY LOGS | Official Store</title>
    <style>
        :root { --primary: #00ff00; --accent: #ff00ff; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; min-height: 100vh; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: var(--primary); font-size: 1.5rem; text-decoration: none; letter-spacing: 2px; }
        #login-box { max-width: 400px; margin: 80px auto; padding: 40px; background: #111; border-radius: 20px; border: 1px solid var(--primary); text-align: center; box-shadow: 0 0 30px rgba(0,255,0,0.1); }
        #shop-page { display: none; padding: 20px 5%; }
        .hero { text-align: center; padding: 50px 0; background: radial-gradient(circle, rgba(255,0,255,0.1) 0%, transparent 70%); }
        .hero h1 { font-size: 2.8rem; margin: 0; background: linear-gradient(to right, #00ff00, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .card { background: #161616; border-radius: 15px; border: 1px solid #333; transition: 0.3s; padding: 25px; text-align: left; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .buy-btn { display: block; background: var(--primary); color: black; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        .floating-wa { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 2000; }
    </style>
</head>
<body>
    <nav class="navbar"><a href="#" class="logo">SUBBY LOGS</a></nav>
    <div id="login-box">
        <h2 style="color:var(--primary)">Exclusive Access</h2>
        <form id="accessForm">
            <input type="email" placeholder="Gmail Address" required>
            <input type="password" id="pw" placeholder="Enter Password" required>
            <button type="submit" style="background:var(--primary); width:100%; padding:15px; border:none; font-weight:bold; cursor:pointer; margin-top:10px; border-radius:5px;">ENTER MARKETPLACE</button>
        </form>
    </div>
    <div id="shop-page">
        <div class="hero">
            <h1>PREMIUM ACTIVE LOGS</h1>
            <p style="color:#888">Secure. Verified. Instant.</p>
        </div>
        <div class="grid">
            <div class="card">
                <h3 style="color:var(--primary)">USA Active IG</h3>
                <p>Aged accounts with high activity scores.</p>
                <a href="https://wa.me/2347048141378?text=I%20want%20to%20buy%20IG%20Logs" class="buy-btn">PURCHASE NOW</a>
            </div>
            <div class="card">
                <h3 style="color:var(--primary)">Elite FB / X Logs</h3>
                <p>Verified logins with bypass protection.</p>
                <a href="https://wa.me/2347048141378?text=I%20want%20to%20buy%20FB%20X%20Logs" class="buy-btn">PURCHASE NOW</a>
            </div>
        </div>
    </div>
    <a href="https://wa.me/2347048141378" class="floating-wa">Chat Support</a>
    <script>
        document.getElementById('accessForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pw = document.getElementById('pw').value;
            const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9!@#$%\^&\*])/;
            if(strongRegex.test(pw)) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('shop-page').style.display = 'block';
            } else { alert('Security: 1 Capital, 1 Small, and 1 Number/Symbol required.'); }
        });
    </script>
</body>
</html>
